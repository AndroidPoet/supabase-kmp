build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

complexity:
  LongParameterList:
    # Multiplatform client/builder APIs intentionally expose many named, defaulted
    # parameters rather than mandatory option objects.
    functionThreshold: 12
    constructorThreshold: 14
    ignoreDefaultParameters: true
  LongMethod:
    # ktlint (ktlint_official) expands single-line builder calls onto multiple
    # lines via trailing commas, so a few wide test bodies land just over 80.
    threshold: 100
  LargeClass:
    # Test classes accumulate many small @Test methods; this rule targets
    # production design smells, not exhaustive test suites.
    excludes: ['**/test/**', '**/commonTest/**', '**/androidUnitTest/**', '**/*Test.kt']
  TooManyFunctions:
    active: false
  CyclomaticComplexMethod:
    threshold: 20

style:
  MagicNumber:
    active: false
  ReturnCount:
    max: 5
  MaxLineLength:
    # ktlint (ktlint_official) owns wrapping; its continuation indent can push a
    # handful of unbreakable lines (string templates, URLs) a few chars past 140.
    # Keep a small margin so the formatter and the analyzer agree.
    maxLineLength: 150
  UnusedPrivateMember:
    active: true
  ForbiddenComment:
    active: false

naming:
  FunctionNaming:
    # PostgREST DSL uses backticked operator names like `in`.
    ignoreAnnotated: ['FilterDsl']

exceptions:
  TooGenericExceptionCaught:
    active: false
  SwallowedException:
    active: false
  ThrowingExceptionsWithoutMessageOrCause:
    active: false
