name: CodeQL

on:
  push:
    branches: [main]
    paths-ignore: &docs-paths
      - '**/*.md'
      - 'website/**'
      - 'art/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore: *docs-paths
  schedule:
    # Weekly, so newly-published CodeQL queries catch issues even without a push.
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      # Kotlin extraction requires a traced compile (build-mode: none only sees
      # Java, and this project is ~all Kotlin). Manual mode lets us compile just
      # the JVM source sets of the library modules — enough for CodeQL to trace
      # every published module without pulling in the Android sample build.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      # --rerun-tasks --no-build-cache force kotlinc to actually run under the
      # tracer; otherwise setup-gradle's restored cache makes compileKotlinJvm
      # UP-TO-DATE, CodeQL sees no compilation, and the analysis fails with
      # "no source code seen during build".
      - name: Compile JVM sources (traced by CodeQL)
        run: ./gradlew compileKotlinJvm --no-daemon --no-build-cache --rerun-tasks

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
