name: CodeQL

on:
  push:
    branches: [main]
    paths-ignore: &docs-paths
      - '**/*.md'
      - 'website/**'
      - 'art/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore: *docs-paths
  schedule:
    # Weekly, so newly-published CodeQL queries catch issues even without a push.
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      # No-build extraction. The traced-compile (manual) path runs CodeQL's
      # Kotlin compiler plugin, which hard-fails on Kotlin 2.4.0
      # ("KotlinVersionTooRecentError: supports versions below 2.3.30"). The
      # no-build mode extracts Kotlin straight from source, so analysis keeps
      # working on newer Kotlin until the traced extractor catches up.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
