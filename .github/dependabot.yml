version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      kotlin-and-ktor:
        patterns:
          - "org.jetbrains.kotlin*"
          - "io.ktor*"
          - "org.jetbrains.kotlinx*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
