site_name: Supabase KMP
site_description: Kotlin Multiplatform SDK for Supabase
site_url: https://androidpoet.github.io/supabase-kmp/
repo_url: https://github.com/AndroidPoet/supabase-kmp
repo_name: AndroidPoet/supabase-kmp

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.share

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: README.md
  - Getting Started: guides/getting-started.md
  - Architecture: concepts/architecture.md
  - Error Handling: concepts/error-handling.md
  - Authentication Guide: guides/authentication.md
  - Database Guide: guides/database.md
  - Storage Guide: guides/storage.md
  - Realtime Guide: guides/realtime.md
  - Functions Guide: guides/functions.md
  - Build a Todo App: tutorials/todo-app.md
  - Auth + Session Lifecycle: tutorials/auth-session-lifecycle.md
  - Module Overview: reference/module-overview.md
  - Configuration Reference: reference/configuration-reference.md
  - Platform & Engine Matrix: reference/platform-engine-matrix.md
  - API Overview: api/overview.md
  - Core API: api/core.md
  - Client API: api/client.md
  - Auth API: api/auth.md
  - Database API: api/database.md
  - Storage API: api/storage.md
  - Realtime API: api/realtime.md
  - Functions API: api/functions.md
  - Production Checklist: operations/production-checklist.md
  - Troubleshooting: operations/troubleshooting.md
  - Security Notes: operations/security.md
  - FAQ: faq/faq.md
  - Contributing: guides/contributing.md
  - GitBook Publishing: guides/gitbook-publishing.md
